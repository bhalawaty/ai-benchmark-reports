<!DOCTYPE html>
<html lang="en">
<head>
<script>(function(){var t=localStorage.getItem("idaratech-theme");if(t==="dark"||(!t&&window.matchMedia("(prefers-color-scheme:dark)").matches))document.documentElement.setAttribute("data-theme","dark")})()</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idaratech — AI Model Selection · Reporting V2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#1a3a5c;--blue:#1e6fa8;--lb:#4db8e8;--teal:#2db5a3;--purple:#7c4daa;--orange:#e8873a;--red:#c94040;--silver:#9ca3af;--bg:#0a1628;--sf:#0f2040;--sf2:#162b50;--bd:#1e3a5c;--tx:#e8f0f8;--mu:#7a9bbf;--dm:#3a5a7c}
body{background:var(--bg);color:var(--tx);font-family:'Inter',-apple-system,system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;zoom:1.5}
.header{display:flex;justify-content:space-between;align-items:center;padding:10px 24px 8px}
.header-left{display:flex;align-items:center;gap:10px}
.brand{color:var(--lb);font-size:13px;font-weight:700}.sep{color:var(--bd);font-size:12px}.sub{color:var(--dm);font-size:11px}
.header-right{display:flex;align-items:center;gap:12px}
.jump-btn{background:transparent;color:var(--mu);border:1px solid var(--bd);border-radius:6px;padding:3px 10px;cursor:pointer;font-size:11px;font-family:inherit}
.jump-btn.active{background:var(--navy)}
.slide-num{color:var(--dm);font-size:11px;font-weight:600}
.jump-nav{display:none;flex-wrap:wrap;gap:6px;padding:6px 24px 8px;border-bottom:1px solid var(--bd)}
.jump-nav.open{display:flex}
.jump-nav button{background:var(--sf);color:var(--mu);border:1px solid var(--bd);border-radius:6px;padding:3px 10px;cursor:pointer;font-size:11px;font-family:inherit}
.jump-nav button.active{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:700}
.progress{display:flex;gap:3px;padding:0 24px}
.progress div{flex:1;height:3px;border-radius:2px;background:var(--bd);cursor:pointer;transition:background .2s}
.progress div.done{background:var(--blue)}.progress div.cur{background:var(--orange)}
.slide-area{flex:1;padding:16px 30px;overflow:auto}
.slide{display:none;height:100%;flex-direction:column}.slide.active{display:flex}
.footer{display:flex;justify-content:space-between;align-items:center;padding:6px 28px 14px}
.footer .author{color:var(--dm);font-size:11px}
.footer .nav{display:flex;align-items:center;gap:16px}
.footer .label{color:var(--dm);font-size:11px}
.btn{border-radius:8px;padding:7px 22px;font-weight:700;font-size:13px;cursor:pointer;border:none;font-family:inherit}
.btn-prev{background:var(--sf2);color:var(--tx);border:1px solid var(--bd)}
.btn-prev:disabled{background:var(--sf);color:var(--dm);cursor:not-allowed}
.btn-next{background:var(--blue);color:#fff}.btn-next:disabled{background:var(--sf);color:var(--dm);cursor:not-allowed}
.st{margin-bottom:14px}
.badge{display:inline-block;font-size:10px;font-weight:800;padding:3px 10px;border-radius:99px;letter-spacing:1px;text-transform:uppercase;color:#fff;margin-bottom:7px}
.st h2{font-size:22px;font-weight:800;color:var(--tx);margin:0}
.st .bar{height:3px;width:48px;background:linear-gradient(90deg,var(--orange),var(--blue));border-radius:2px;margin-top:6px}
.card{background:var(--sf);border-radius:10px;padding:13px 16px;border:1px solid var(--bd)}
.info{background:var(--sf2);border:1.5px solid var(--orange);border-left:4px solid var(--orange);border-radius:8px;padding:9px 14px;color:var(--mu);font-size:12px;margin-top:8px;box-shadow:0 0 8px #e8873a33}
.cons{background:var(--sf2);border:1.5px solid var(--red);border-left:4px solid var(--red);border-radius:8px;padding:9px 14px;color:var(--mu);font-size:12px;margin-top:8px;box-shadow:0 0 8px #c9404033}
.bul{display:flex;gap:8px;align-items:flex-start;margin-bottom:5px}
.bul .dot{margin-top:2px;flex-shrink:0;font-size:12px}
.bul span:last-child{color:var(--mu);font-size:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;flex:1}
.g2s{display:grid;grid-template-columns:1fr 1.6fr;gap:14px;flex:1}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--navy);color:var(--mu);padding:7px 10px;text-align:left;font-size:10px;font-weight:700}
td{padding:7px 10px;font-size:11px;vertical-align:top;border-bottom:1px solid var(--bd)}
tr:nth-child(even){background:var(--sf)}tr:nth-child(odd){background:var(--sf2)}
.mono{font-family:'Courier New',monospace}
.step-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px}
.step-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;flex-shrink:0;margin-top:2px}
.flow-step{display:flex;gap:8px;margin-bottom:4px;align-items:flex-start}
.flow-num{color:#fff;font-weight:800;width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}
.role-row{display:flex;gap:8px;margin-bottom:5px;padding:5px 8px;border-radius:6px;background:var(--sf2);border:1px solid var(--bd)}
.spec-item{margin-bottom:5px}.spec-item .k{color:var(--dm);font-size:10px}.spec-item .v{color:var(--tx);font-size:11px;font-weight:600}
.cover-center{display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;text-align:center;gap:22px}
.cover-logo{display:flex;align-items:center;gap:16px;background:var(--sf);border-radius:16px;padding:14px 28px;border:1px solid var(--bd)}
.agenda-item{display:flex;gap:12px;align-items:flex-start}
.agenda-num{color:#fff;font-weight:800;width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.code-block{background:var(--sf2);border-radius:8px;padding:10px 12px;font-size:11px;font-family:'Courier New',monospace}
.tenant-box{background:var(--sf2);border-radius:8px;padding:8px;margin-bottom:6px}
.data-section{border-radius:6px;padding:8px;margin-bottom:6px}
.factor-card{display:flex;gap:12px;align-items:flex-start;padding:10px 14px}
.factor-q{background:var(--sf2);border-radius:6px;padding:4px 10px;color:var(--dm);font-size:11px;margin-top:5px}
.tok-row{display:flex;gap:8px;margin-top:6px}
.tok-box{flex:1;border-radius:6px;padding:8px 10px}

/* ===== Dark / Light Mode ===== */
:root{--bg:#F8FAFC;--bg-deep:#F1F5F9;--surface:#fff;--surface-hover:#F8FAFC;--border:#E2E8F0;--border-light:#F1F5F9;--text:#1E293B;--text-secondary:#475569;--text-muted:#64748B;--text-faint:#94A3B8;--heading:#0F172A;--code-bg:#F1F5F9;--pre-bg:#0F172A;--toggle-bg:#1E293B;--toggle-color:#F0FDFA}
[data-theme="dark"]{--bg:#0B1120;--bg-deep:#0F172A;--surface:#1E293B;--surface-hover:#334155;--border:#334155;--border-light:#1E293B;--text:#E2E8F0;--text-secondary:#94A3B8;--text-muted:#64748B;--text-faint:#64748B;--heading:#F1F5F9;--code-bg:#334155;--pre-bg:#020617;--toggle-bg:#F8FAFC;--toggle-color:#0F172A;color-scheme:dark}
body{background:var(--bg)!important;color:var(--text)!important}
.tab-nav{background:var(--surface)!important;border-color:var(--border)!important}
.tb{color:var(--text-muted)!important}
.card,.model-card,.stat-card,.panel,.report-card,.tl-card,.alert,.sec{background:var(--surface)!important;border-color:var(--border)!important}
.report-card:hover{border-color:var(--surface-hover)!important;background:var(--surface)!important}
table th{color:var(--text-muted)!important;border-color:var(--border)!important}
table td{color:var(--text)!important;border-color:var(--border-light)!important}
tr:hover td{background:var(--bg-deep)!important}
table tfoot td{color:var(--text)!important}
h2{color:var(--heading)!important;border-color:var(--border)!important}
h3,h4,.card-title,.mc-name,.model-name,.section-title{color:var(--heading)!important}
p,li{color:var(--text-secondary)!important}
.mc-metric,.metric{background:var(--bg-deep)!important;border-color:var(--border)!important}
.mc-metric .ml,.metric-l{color:var(--text-faint)!important}
.mc-sub,.card-desc,.model-tag,.section-desc{color:var(--text-muted)!important}
.bar-track{background:var(--border)!important}
.bar-label .v,.bar-header .v{color:var(--text-muted)!important}
.bar-label .n,.bar-header .n{color:var(--text)!important}
pre{background:var(--pre-bg)!important}
code{background:var(--code-bg)!important}
td.num{color:var(--text)!important}
.sub,.card-meta-item{color:var(--text-muted)!important}
.cards-section{background:var(--bg)!important}
.note-info,.alert-info{background:color-mix(in srgb,var(--surface) 80%,#4338CA 20%)!important;border-color:#4338CA!important;color:var(--text)!important}
.note-warn,.alert-warn{background:color-mix(in srgb,var(--surface) 80%,#B45309 20%)!important;border-color:#B45309!important;color:var(--text)!important}
.note-success,.alert-success{background:color-mix(in srgb,var(--surface) 80%,#15803D 20%)!important;border-color:#15803D!important;color:var(--text)!important}
.note-danger,.alert-danger{background:color-mix(in srgb,var(--surface) 80%,#991B1B 20%)!important;border-color:#991B1B!important;color:var(--text)!important}
.strategy-toggle button,.tabs button{background:var(--surface)!important;color:var(--text-muted)!important;border-color:var(--border)!important}
.info-banner{border-color:var(--border)!important}
.slide{background:var(--surface)!important;border-color:var(--border)!important}
.hero-stat{background:rgba(255,255,255,.08)!important}
.card-link{color:var(--text-muted)!important}
.sec h2{border-color:var(--border)!important}
.sec h3{border-color:var(--border)!important}
#theme-toggle{position:fixed;bottom:24px;right:24px;width:44px;height:44px;border-radius:50%;background:var(--toggle-bg);color:var(--toggle-color);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.25);z-index:999;font-size:20px;border:none;transition:transform .2s,box-shadow .2s;-webkit-tap-highlight-color:transparent}
#theme-toggle:hover{transform:scale(1.1);box-shadow:0 6px 20px rgba(0,0,0,.35)}

</style>
</head>
<body>
<div class="header">
<div class="header-left">
<img src="icon.svg" alt="Idaratech" style="height:28px">
<span class="sep">|</span><span class="sub">AI Model Selection — Reporting V2</span>
</div>
<div class="header-right">
<button class="jump-btn" id="jumpBtn" onclick="toggleJump()">☰ Jump</button>
<span class="slide-num" id="slideNum"></span>
</div>
</div>
<div class="jump-nav" id="jumpNav"></div>
<div class="progress" id="progressBar"></div>
<div class="slide-area" id="slideArea"></div>
<div class="footer">
<span class="author">Bilal Elhalawaty</span>
<div class="nav">
<button class="btn btn-prev" id="prevBtn" onclick="go(-1)">← Prev</button>
<span class="label" id="slideLabel"></span>
<button class="btn btn-next" id="nextBtn" onclick="go(1)">Next →</button>
</div>
</div>

<script>
const labels=["Cover","Agenda","Training","Pipeline","DB: Option A","DB: Option B","B: Auth+Tenant+Security","DB: Option C","5 Factors","Qwen3-32B","Qwen3-235B","Claude Opus","Gemini 2.5 Pro","Gemini 3.1 Pro","Cost","Recommendation"];
const T=labels.length;
let cur=0,navOpen=false;

function bul(c,t){return`<div class="bul"><span class="dot" style="color:${c}">▸</span><span>${t}</span></div>`}
function info(i,t){return`<div class="info">${i?`<span style="margin-right:6px">${i}</span>`:''}${t}</div>`}
function consx(t){return`<div class="cons">${t}</div>`}
function bdg(t,c){return`<span class="badge" style="background:${c}">${t}</span>`}
function st(t,b,bc){return`<div class="st">${b?`<div>${bdg(b,bc)}</div>`:''}${'<h2>'+t+'</h2>'}<div class="bar"></div></div>`}

function tokBox(label,color,avg,en,ar,border){
return`<div class="tok-box" style="background:var(--sf2);border:1px solid ${border||color}">
<div style="color:var(--dm);font-size:9px;font-weight:700;letter-spacing:.5px;margin-bottom:3px">${label}</div>
<div style="color:${color};font-size:14px;font-weight:800">${avg}</div>
<div style="display:flex;gap:10px;margin-top:3px">
<span style="color:var(--dm);font-size:9px">EN: ${en}</span>
<span style="color:var(--dm);font-size:9px">AR: ${ar}</span>
</div>
<div style="color:var(--dm);font-size:8px;margin-top:3px;font-style:italic">* benchmark context — see note</div>
</div>`}

function modelSlide(title,bg,bc,specs,tokA,tokB,ft,ftOk,factors){
return`${st(title,bg,bc)}
<div class="g2s" style="flex:1">
<div style="display:flex;flex-direction:column;gap:8px;overflow-y:auto">
<div class="card" style="padding:10px 14px">
<div style="font-weight:700;color:var(--dm);font-size:10px;margin-bottom:6px;letter-spacing:1px">SPECS</div>
${specs.map(([k,v])=>`<div class="spec-item"><div class="k">${k}</div><div class="v">${v}</div></div>`).join('')}
</div>
<div class="card" style="background:var(--sf2);border:1px solid ${bc};padding:10px 14px">
<div style="color:var(--dm);font-size:10px;font-weight:700;margin-bottom:6px;letter-spacing:.5px">AVG TOKENS / REQUEST (Benchmarked)</div>
<div class="tok-row">
${tokA?tokBox('🅰️ OPTION A · SQL','var(--purple)',tokA.avg,tokA.en,tokA.ar,'var(--purple)'):'<div class="tok-box" style="background:var(--sf);border:1px solid var(--bd)"><div style="color:var(--dm);font-size:9px">🅰️ OPTION A · SQL</div><div style="color:var(--dm);font-size:11px;margin-top:3px">Not tested</div></div>'}
${tokB?tokBox('🅱️ OPTION B · Tools','var(--teal)',tokB.avg,tokB.en,tokB.ar,'var(--teal)'):'<div class="tok-box" style="background:var(--sf);border:1px solid var(--bd)"><div style="color:var(--dm);font-size:9px">🅱️ OPTION B · Tools</div><div style="color:var(--dm);font-size:11px;margin-top:3px">Not tested</div></div>'}
</div>
</div>
<div class="card" style="background:${ftOk?'#0a1f0a':'#1f0a0a'};border:1px solid ${ftOk?'var(--teal)':'var(--red)'};padding:10px 14px">
<div style="color:var(--dm);font-size:10px;margin-bottom:3px">FINE-TUNING</div>
<div style="color:${ftOk?'var(--teal)':'var(--red)'};font-size:11px;font-weight:700">${ft}</div>
</div>
</div>
<div style="display:flex;flex-direction:column;gap:6px;overflow-y:auto">
${factors.map(f=>`<div class="card" style="padding:8px 12px"><div style="display:flex;gap:8px"><span style="font-size:13px;flex-shrink:0">${f.i}</span><div><div style="font-weight:700;font-size:11px">${f.l}</div><div style="color:var(--mu);font-size:11px">${f.b}</div></div></div></div>`).join('')}
</div>
</div>`}

const slides=[
// 0 Cover
()=>`<div class="cover-center">
<div class="cover-logo">
<img src="icon.svg" alt="Idaratech" style="height:64px">
</div>
<div><h1 style="font-size:34px;font-weight:900;margin-bottom:8px">AI Model Selection</h1><p style="color:var(--mu);font-size:16px">Reporting V2 — Technical Research &amp; Recommendation</p></div>
${info('⚠️','<strong style="color:var(--orange)">This is a proposal / research document — not a finalized decision</strong>')}
<div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">${['Idaratech HR Platform','2026'].map(m=>`<span style="background:var(--sf2);color:var(--mu);font-size:12px;padding:5px 14px;border-radius:99px;border:1px solid var(--bd)">${m}</span>`).join('')}</div>
</div>`,

// 1 Agenda
()=>{const items=[{n:'1',t:'Training Approach: Session-Based vs Fine-Tuning',c:'var(--blue)'},{n:'2',t:'How Our AI Reporting Feature Could Work',c:'var(--teal)'},{n:'3',t:'DB Access Strategy: Three Options',c:'var(--orange)'},{n:'4',t:'Why Tool-Based Solves Auth + Security + Tenancy',c:'var(--lb)'},{n:'5',t:'The 5 Critical Decision Factors',c:'var(--red)'},{n:'6',t:'Model Candidates & Deep Evaluation (5 Models)',c:'var(--purple)'},{n:'7',t:'Cost Comparison & Recommendation',c:'var(--teal)'}];
return`${st('Agenda')}<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;flex:1">${items.map(i=>`<div class="card agenda-item"><div class="agenda-num" style="background:${i.c}">${i.n}</div><span style="font-size:13px">${i.t}</span></div>`).join('')}</div>`},

// 2 Training Approach
()=>`${st('Training Approach: What Will We Use?')}
<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:8px">
<div class="card" style="border:1.5px solid var(--teal);background:var(--sf2);padding:10px 14px">
<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="font-size:16px">💡</span><strong style="color:var(--teal);font-size:12px">Usage ≠ Learning. Ever.</strong></div>
<div style="color:var(--mu);font-size:11px">The model does NOT learn from your employees' queries. Each conversation starts completely fresh. No data is retained between requests.</div>
</div>
<div class="card" style="border:1.5px solid var(--lb);background:var(--sf2);padding:10px 14px">
<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="font-size:16px">💡</span><strong style="color:var(--lb);font-size:12px">Weights Are Frozen Files</strong></div>
<div style="color:var(--mu);font-size:11px">Pre-training + tuning happen once offline by the AI company. Model weights are read-only frozen files — physically cannot change from usage.</div>
</div>
</div>
<div class="g2" style="flex:1">
<div class="card" style="border:2px solid var(--teal);display:flex;flex-direction:column;gap:6px">
${bdg('RECOMMENDATION — PHASE 1','var(--teal)')}
<div style="font-weight:800;font-size:14px">Session-Based + RAG</div>
<div style="color:var(--dm);font-size:11px;font-weight:700">USE MODEL AS-IS — NO TRAINING FROM OUR SIDE</div>
${bul('var(--teal)','Use the pre-trained model directly — no additional training')}
${bul('var(--teal)','Inject tool definitions + descriptions into the system prompt')}
${bul('var(--teal)','Each API call is 100% stateless — model retains nothing')}
${bul('var(--teal)','Zero risk of client data entering any training pipeline')}
${bul('var(--teal)','Ready immediately — fastest path to production')}
${info('','<strong style="color:var(--orange)">Example:</strong> User asks "كم موظف غاب هذا الشهر؟" → we inject tool defs → model picks get_attendance_summary(period="this_month") → our backend executes → result shown.')}
</div>
<div class="card" style="display:flex;flex-direction:column;gap:6px">
${bdg('FUTURE OPTION — PHASE 2','var(--dm)')}
<div style="font-weight:800;font-size:14px">Fine-Tuning</div>
<div style="color:var(--dm);font-size:11px;font-weight:700">OFFLINE TRAINING ON OUR OWN DATA</div>
${bul('var(--blue)','Collect real usage logs: prompts where model made mistakes')}
${bul('var(--blue)','Build corrected prompt → tool selection pairs (anonymized)')}
${bul('var(--blue)','Run offline fine-tune job — model specializes for our HR tools')}
${bul('var(--orange)','⚠️ Only feasible with Qwen3 (self-hosted) or Gemini via Vertex AI')}
${bul('var(--red)','❌ Not available on Claude — Anthropic does not offer fine-tuning')}
${info('','When to consider: after 6–12 months, if prompt engineering alone is not achieving accuracy needed.')}
</div>
</div>`,

// 3 Pipeline
()=>{const steps=[{i:'💬',l:'User',d:'"عدد الموظفين السعوديين في قسم المبيعات"'},{i:'⚙️',l:'Our Backend',d:'Authenticate → Identify tenant → Check role → Build prompt with ONLY tools this role can access'},{i:'🤖',l:'AI Model',d:'Selects best matching tool + fills parameters. Never sees real data. Never executes anything.'},{i:'🛡️',l:'Validation Layer',d:'Double-check permission → Validate tool → Resolve tenant DB from auth → Execute pre-built query'},{i:'📊',l:'Response',d:'"عدد الموظفين السعوديين في المبيعات: 47" + CSV / Chart'}];
return`${st('How Our AI Reporting Feature Could Work')}
${info('⚠️','<strong style="color:var(--orange)">Proposal under research</strong> — not a finalized implementation.')}
<div class="g2" style="margin-top:10px;flex:1">
<div style="display:flex;flex-direction:column;gap:2px;justify-content:center">
${steps.map((s,i)=>`<div style="display:flex;gap:10px;align-items:flex-start"><div style="display:flex;flex-direction:column;align-items:center"><div style="background:var(--sf2);border:2px solid var(--blue);border-radius:8px;padding:4px 8px;font-size:15px">${s.i}</div>${i<steps.length-1?'<div style="width:2px;height:10px;background:var(--bd)"></div>':''}</div><div style="padding-bottom:3px"><div style="font-weight:700;color:var(--lb);font-size:12px">${s.l}</div><div style="color:var(--mu);font-size:11px">${s.d}</div></div></div>`).join('')}
</div>
<div style="display:flex;flex-direction:column;gap:8px">
<div class="card" style="border:1px solid var(--teal)">
<div style="font-weight:700;color:var(--teal);font-size:13px;margin-bottom:6px">✓ What This Guarantees</div>
${bul('var(--teal)','AI never has network access to any database')}
${bul('var(--teal)','Authorization enforced BEFORE and AFTER AI responds')}
${bul('var(--teal)','Each role sees only permitted tools — AI doesn\'t know others exist')}
${bul('var(--teal)','Tenant resolved from auth — never from AI prompt or response')}
${bul('var(--teal)','Full audit trail — every query logged with user + tenant ID')}
</div>
<div class="card" style="background:var(--sf2)">
<div style="font-weight:700;color:var(--mu);font-size:12px;margin-bottom:4px">📌 AI Only Sees Text</div>

function render(){
const a=document.getElementById('slideArea');
a.innerHTML=`<div class="slide active">${slides[cur]()}</div>`;
document.getElementById('slideNum').textContent=`${cur+1} / ${T}`;
document.getElementById('slideLabel').textContent=labels[cur];
document.getElementById('prevBtn').disabled=cur===0;
document.getElementById('nextBtn').disabled=cur===T-1;
document.getElementById('progressBar').innerHTML=Array.from({length:T}).map((_,i)=>`<div class="${i===cur?'cur':i<cur?'done':''}" onclick="goTo(${i})"></div>`).join('');
document.getElementById('jumpNav').innerHTML=labels.map((l,i)=>`<button class="${i===cur?'active':''}" onclick="goTo(${i});toggleJump()">${l}</button>`).join('');
}
function go(d){cur=Math.max(0,Math.min(T-1,cur+d));render()}
function goTo(i){cur=i;render()}
function toggleJump(){navOpen=!navOpen;document.getElementById('jumpNav').classList.toggle('open',navOpen);document.getElementById('jumpBtn').classList.toggle('active',navOpen)}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown')go(1);if(e.key==='ArrowLeft'||e.key==='ArrowUp')go(-1)});
render();
</script>

(function(){var t=localStorage.getItem('idaratech-theme'),d=t==='dark'||(!t&&window.matchMedia('(prefers-color-scheme:dark)').matches);if(d)document.getElementById('theme-toggle').innerHTML='\u2600'})();
</script>
